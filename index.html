<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Andora - Tu compañera de skincare natural">
    <meta name="theme-color" content="#6b8200">
    <title>Andora - Skincare App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main id="app" class="app-container">
        <!-- Phone frame -->
        <div class="phone-frame">
            <div id="screen" class="screen-content"></div>
            <nav id="bottom-nav" class="bottom-nav hidden"></nav>
        </div>
    </main>

    <!-- Templates for screens -->
    
    <!-- Login Screen Template -->
    <template id="login-screen">
        <div class="screen login-screen">
            <div class="status-bar dark"></div>
            <div class="screen-content">
                <div class="logo-section">
                    <div class="andora-logo primary">
                        <svg viewBox="0 0 32 32" fill="none" aria-hidden="true">
                            <path d="M16 3C9 8 5 14 5 20a11 11 0 0 0 22 0c0-6-4-12-11-17Z" fill="currentColor" opacity="0.18"/>
                            <path d="M16 5C10 9.5 7 15 7 20.2A9 9 0 0 0 25 20.2C25 15 22 9.5 16 5Z" stroke="currentColor" stroke-width="1.6" fill="none"/>
                            <path d="M16 8.5V25M16 14.5l4-2.6M16 18.5l-4-2.6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                        </svg>
                        <span>andora</span>
                    </div>
                    <p class="text-muted">Iniciar sesión</p>
                </div>

                <form id="login-form" class="form-group">
                    <label class="form-label">
                        <span>Email</span>
                        <input type="email" placeholder="ruby@andora.com" required>
                    </label>
                    <label class="form-label">
                        <span>Contraseña</span>
                        <input type="password" placeholder="••••••••" required>
                    </label>
                    <button type="button" class="forgot-password">¿Olvidaste tu contraseña?</button>
                    <button type="submit" class="btn btn-primary btn-lg">Iniciar sesión</button>
                </form>

                <div class="divider">o continúa con</div>

                <button type="button" class="btn btn-secondary btn-lg google-btn">
                    <svg class="google-icon" viewBox="0 0 24 24" aria-hidden="true">
                        <path fill="#EA4335" d="M12 10.2v3.9h5.5c-.24 1.4-1.7 4.1-5.5 4.1-3.3 0-6-2.7-6-6.1S8.7 6 12 6c1.9 0 3.1.8 3.8 1.5l2.6-2.5C16.8 3.5 14.6 2.5 12 2.5 6.9 2.5 2.8 6.6 2.8 11.7S6.9 21 12 21c5.3 0 8.8-3.7 8.8-9 0-.6-.06-1-.15-1.5H12z"/>
                    </svg>
                    Continuar con Google
                </button>

                <p class="signup-text">¿Aún no tienes cuenta? <span class="signup-link">Regístrate</span></p>
            </div>
        </div>
    </template>

    <!-- Welcome Screen Template -->
    <template id="welcome-screen">
        <div class="screen welcome-screen">
            <div class="status-bar light"></div>
            <div class="screen-content welcome-content">
                <div class="leaf-pattern"></div>
                <div class="gradient-overlay"></div>
                <div class="welcome-body">
                    <div class="andora-logo light large">
                        <svg viewBox="0 0 32 32" fill="none" aria-hidden="true">
                            <path d="M16 3C9 8 5 14 5 20a11 11 0 0 0 22 0c0-6-4-12-11-17Z" fill="currentColor" opacity="0.18"/>
                            <path d="M16 5C10 9.5 7 15 7 20.2A9 9 0 0 0 25 20.2C25 15 22 9.5 16 5Z" stroke="currentColor" stroke-width="1.6" fill="none"/>
                            <path d="M16 8.5V25M16 14.5l4-2.6M16 18.5l-4-2.6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                        </svg>
                        <span>andora</span>
                    </div>
                    <h1>¿Lista para consentir tu piel?</h1>
                    <p>Tu compañera de skincare natural te acompaña en cada paso.</p>
                    <button type="button" class="btn btn-light btn-lg welcome-btn">¿Lista?</button>
                </div>
                <div class="social-row">
                    <a href="#" aria-label="Instagram">
                        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <rect x="3" y="3" width="18" height="18" rx="5" stroke="currentColor" stroke-width="1.6"/>
                            <circle cx="12" cy="12" r="3.5" stroke="currentColor" stroke-width="1.6"/>
                            <circle cx="17.2" cy="6.8" r="1.1" fill="currentColor"/>
                        </svg>
                    </a>
                    <a href="#" aria-label="Facebook">
                        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                            <path d="M13.5 21v-7h2.3l.4-2.7h-2.7V9.5c0-.8.2-1.3 1.4-1.3h1.4V5.8c-.7-.1-1.4-.1-2.1-.1-2.1 0-3.5 1.3-3.5 3.6v2H8.3V14h2.3v7h2.9Z"/>
                        </svg>
                    </a>
                    <a href="#" aria-label="TikTok">
                        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                            <path d="M16.5 3c.3 2 1.5 3.4 3.5 3.6v2.4c-1.2 0-2.4-.4-3.5-1v5.6c0 3-2.2 5.4-5.2 5.4S6 18.6 6 15.6c0-2.8 2.1-5.1 4.9-5.3v2.5c-1.4.2-2.4 1.3-2.4 2.8 0 1.6 1.2 2.8 2.7 2.8 1.5 0 2.7-1.2 2.7-3V3h2.6Z"/>
                        </svg>
                    </a>
                    <span>@andora</span>
                </div>
            </div>
        </div>
    </template>

    <!-- Greeting Screen Template -->
    <template id="greeting-screen">
        <div class="screen greeting-screen">
            <div class="status-bar light"></div>
            <div class="screen-content">
                <div class="leaf-pattern"></div>
                <div class="gradient-overlay"></div>
                <div class="greeting-body">
                    <div class="andora-logo light">
                        <svg viewBox="0 0 32 32" fill="none" aria-hidden="true">
                            <path d="M16 3C9 8 5 14 5 20a11 11 0 0 0 22 0c0-6-4-12-11-17Z" fill="currentColor" opacity="0.18"/>
                            <path d="M16 5C10 9.5 7 15 7 20.2A9 9 0 0 0 25 20.2C25 15 22 9.5 16 5Z" stroke="currentColor" stroke-width="1.6" fill="none"/>
                            <path d="M16 8.5V25M16 14.5l4-2.6M16 18.5l-4-2.6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                        </svg>
                        <span>andora</span>
                    </div>
                    <h1>¡Hola Ruby!</h1>
                    <p>Tu piel habla de cómo te tratas. Todo listo para consentirte.</p>
                    <button type="button" class="btn btn-light btn-lg greeting-btn">Empecemos</button>
                </div>
                <div class="social-row">
                    <a href="#" aria-label="Instagram">
                        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <rect x="3" y="3" width="18" height="18" rx="5" stroke="currentColor" stroke-width="1.6"/>
                            <circle cx="12" cy="12" r="3.5" stroke="currentColor" stroke-width="1.6"/>
                            <circle cx="17.2" cy="6.8" r="1.1" fill="currentColor"/>
                        </svg>
                    </a>
                    <a href="#" aria-label="Facebook">
                        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                            <path d="M13.5 21v-7h2.3l.4-2.7h-2.7V9.5c0-.8.2-1.3 1.4-1.3h1.4V5.8c-.7-.1-1.4-.1-2.1-.1-2.1 0-3.5 1.3-3.5 3.6v2H8.3V14h2.3v7h2.9Z"/>
                        </svg>
                    </a>
                    <a href="#" aria-label="TikTok">
                        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                            <path d="M16.5 3c.3 2 1.5 3.4 3.5 3.6v2.4c-1.2 0-2.4-.4-3.5-1v5.6c0 3-2.2 5.4-5.2 5.4S6 18.6 6 15.6c0-2.8 2.1-5.1 4.9-5.3v2.5c-1.4.2-2.4 1.3-2.4 2.8 0 1.6 1.2 2.8 2.7 2.8 1.5 0 2.7-1.2 2.7-3V3h2.6Z"/>
                        </svg>
                    </a>
                    <span>@andora</span>
                </div>
            </div>
        </div>
    </template>

    <!-- Categories Screen Template -->
    <template id="categories-screen">
        <div class="screen categories-screen">
            <div class="status-bar dark"></div>
            <div class="header">
                <button type="button" class="btn-icon back-btn" aria-label="Volver">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </button>
            </div>
            <div class="screen-content">
                <div class="page-header">
                    <h1>Comienza con tu rutina</h1>
                    <p>Selecciona el tipo de producto que se adapta a tu proceso.</p>
                </div>

                <div id="categories-list" class="categories-list"></div>

                <div class="footer-bar">
                    <div class="phase-badge" data-phase="1"></div>
                    <button type="button" class="btn btn-primary continue-btn">Continuar</button>
                </div>
            </div>
        </div>
    </template>

    <!-- Recommendation Screen Template -->
    <template id="recommendation-screen">
        <div class="screen recommendation-screen">
            <div class="status-bar dark"></div>
            <div class="header">
                <button type="button" class="btn-icon back-btn" aria-label="Volver">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </button>
            </div>
            <div class="screen-content">
                <div class="page-header">
                    <h1>Elige tu producto</h1>
                    <p>Selecciona el producto que pondrá en marcha tu rutina.</p>
                </div>

                <div id="products-list" class="products-list"></div>

                <div class="info-box accent">
                    <svg class="icon-small" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                    <div>
                        <strong>Resultados estimados:</strong> verás resultados visibles entre los días 14 y 21 de uso constante.
                    </div>
                </div>

                <div class="footer-bar">
                    <div class="phase-badge" data-phase="2"></div>
                    <button type="button" class="btn btn-primary continue-btn">Continuar</button>
                </div>
            </div>
        </div>
    </template>

    <!-- Process Screen Template -->
    <template id="process-screen">
        <div class="screen process-screen">
            <div class="status-bar dark"></div>
            <div class="header">
                <button type="button" class="btn-icon back-btn" aria-label="Volver">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </button>
            </div>
            <div class="screen-content">
                <div class="process-header">
                    <div>
                        <h1>Tu proceso comienza hoy</h1>
                    </div>
                    <img src="assets/images/botanical-fairy.png" alt="Ilustración botánica" class="botanical-img">
                </div>

                <h2 class="subsection-title">¿Cómo usar tu crema?</h2>

                <div id="steps-list" class="steps-list">
                    <div class="step-item">
                        <span class="step-number">1</span>
                        <div>
                            <strong>Limpia tu rostro</strong>
                            <p>Asegúrate de que tu piel esté limpia y seca.</p>
                        </div>
                    </div>
                    <div class="step-item">
                        <span class="step-number">2</span>
                        <div>
                            <strong>Aplica la cantidad</strong>
                            <p>Toma una porción del tamaño de un chícharo.</p>
                        </div>
                    </div>
                    <div class="step-item">
                        <span class="step-number">3</span>
                        <div>
                            <strong>Masajea suavemente</strong>
                            <p>Con movimientos circulares hasta su completa absorción.</p>
                        </div>
                    </div>
                    <div class="step-item">
                        <span class="step-number">4</span>
                        <div>
                            <strong>Úsala en la noche</strong>
                            <p>La constancia es clave para obtener mejores resultados.</p>
                        </div>
                    </div>
                </div>

                <div class="info-box accent">
                    <svg class="icon-small" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                    <div>
                        <strong>Consejo Andora:</strong> acompaña tu crema con suficiente agua durante el día para potenciar la transformación de tu piel.
                    </div>
                </div>

                <div class="footer-bar">
                    <div class="phase-badge" data-phase="3"></div>
                    <button type="button" class="btn btn-primary continue-btn">Iniciar seguimiento</button>
                </div>
            </div>
        </div>
    </template>

    <!-- Home Screen Template -->
    <template id="home-screen">
        <div class="screen home-screen">
            <div class="status-bar dark"></div>
            <div class="home-header">
                <button type="button" class="btn-icon" aria-label="Menú">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <div class="header-actions">
                    <button type="button" class="btn-icon notification-btn" aria-label="Notificaciones">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                        </svg>
                        <span class="notification-dot"></span>
                    </button>
                    <button type="button" class="btn-icon profile-btn" aria-label="Perfil">R</button>
                </div>
            </div>
            <div class="screen-content">
                <div class="greeting">
                    <h1>¡Hola Ruby!</h1>
                    <p>Qué gusto verte de nuevo</p>
                </div>

                <div class="product-card primary">
                    <div class="card-content">
                        <span class="phase-label">Fase 1 · Día 7 de 31</span>
                        <h2>Hidratación Profunda</h2>
                        <p>Tu producto del día está listo para aplicar.</p>
                    </div>
                    <img src="assets/images/product-serum.png" alt="Producto del día" class="product-img">
                </div>

                <h3 class="section-title">Rutina de hoy</h3>
                <div class="routine-cards">
                    <div class="routine-card done">
                        <div class="routine-icon">
                            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                                <circle cx="12" cy="12" r="9"></circle>
                                <path d="M12 2a10 10 0 1 1 0 20 10 10 0 0 1 0-20z" fill="none"/>
                            </svg>
                        </div>
                        <p class="routine-title">Mañana</p>
                        <p class="routine-sub">Limpieza + FPS</p>
                        <span class="badge done">Completado</span>
                    </div>
                    <div class="routine-card">
                        <div class="routine-icon">
                            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                            </svg>
                        </div>
                        <p class="routine-title">Noche</p>
                        <p class="routine-sub">Crema hidratante</p>
                        <span class="badge pending">Pendiente</span>
                    </div>
                </div>

                <button type="button" class="btn-card secondary chat-btn">
                    <span class="card-icon">
                        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                        </svg>
                    </span>
                    <span class="card-text">
                        <span class="card-title">Atención personalizada</span>
                        <span class="card-sub">Habla con Verónica · Chatear ahora</span>
                    </span>
                </button>

                <h3 class="section-title">Tu progreso</h3>
                <button type="button" class="btn-card progress-btn">
                    <svg class="progress-ring" viewBox="0 0 56 56">
                        <circle cx="28" cy="28" r="22" fill="none" stroke="#e8e1c8" stroke-width="6"/>
                        <circle cx="28" cy="28" r="22" fill="none" stroke="#6b8200" stroke-width="6" stroke-linecap="round" stroke-dasharray="138.23" stroke-dashoffset="107.82" transform="rotate(-90 28 28)"/>
                        <text x="28" y="32" text-anchor="middle" class="progress-text">22%</text>
                    </svg>
                    <span class="card-text">
                        <span class="card-title progress-title">
                            <svg class="small-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                                <polyline points="23 6 13.5 15.5 8.5 10.5 1 17"></polyline>
                                <polyline points="17 6 23 6 23 12"></polyline>
                            </svg>
                            7 de 31 días
                        </span>
                        <span class="card-sub">Vas excelente. Mantén la constancia para ver tu transformación.</span>
                    </span>
                </button>
            </div>
        </div>
    </template>

    <!-- Chat Screen Template -->
    <template id="chat-screen">
        <div class="screen chat-screen">
            <div class="status-bar dark"></div>
            <div class="chat-header">
                <button type="button" class="btn-icon back-btn" aria-label="Volver">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </button>
                <div class="chat-info">
                    <div class="chat-avatar">V</div>
                    <div>
                        <p class="chat-name">Verónica</p>
                        <p class="chat-status">
                            <span class="status-dot"></span>
                            Asesora Andora
                        </p>
                    </div>
                </div>
            </div>

            <div id="messages-container" class="messages-container">
                <div class="message from-andora">
                    <p>¡Hola Ruby! Soy Verónica, tu asesora Andora. ¿Cómo va tu rutina hoy?</p>
                </div>
                <div class="message from-me">
                    <p>Hola Verónica, necesito una recomendación para mi piel seca.</p>
                </div>
                <div class="message from-andora">
                    <p>Claro. Para piel seca te sugiero la Crema Humectante por la noche y mantenerte muy bien hidratada. ¿Quieres que la agregue a tu rutina?</p>
                </div>
            </div>

            <div class="quick-replies">
                <button type="button" class="quick-reply">Sí, agrégala</button>
                <button type="button" class="quick-reply">Ver más opciones</button>
                <button type="button" class="quick-reply">Tips para piel seca</button>
            </div>

            <form id="chat-form" class="chat-form">
                <button type="button" class="btn-icon add-btn" aria-label="Adjuntar">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                </button>
                <input type="text" id="message-input" placeholder="Escribe un mensaje..." class="chat-input">
                <button type="submit" class="btn-icon send-btn" aria-label="Enviar">
                    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                        <path d="M16.6915026,12.4744748 L3.50612381,13.2599618 C3.19218622,13.2599618 3.03521743,13.4170592 3.03521743,13.5741566 L1.15159189,20.0151496 C0.8376543,20.8006365 0.99,21.89 1.77946707,22.52 C2.41,22.99 3.50612381,23.1 4.13399899,22.8429026 L21.714504,14.0454487 C22.6563168,13.5741566 23.1272231,12.6315722 22.9702544,11.6889879 L4.13399899,1.16886554 C3.34915502,0.9 2.40734225,0.9 1.77946707,1.4429026 C0.994623095,2.0804157 0.837654326,3.0229932 1.15159189,3.98956657 L3.03521743,10.4305595 C3.03521743,10.5876569 3.19218622,10.7447543 3.50612381,10.7447543 L16.6915026,11.5302412 C16.6915026,11.5302412 17.1624089,11.5302412 17.1624089,12.0015333 C17.1624089,12.4744748 16.6915026,12.4744748 16.6915026,12.4744748 Z"/>
                    </svg>
                </button>
            </form>
        </div>
    </template>

    <!-- Progress Screen Template -->
    <template id="progress-screen">
        <div class="screen progress-screen">
            <div class="status-bar dark"></div>
            <div class="page-header">
                <h1>Tu progreso</h1>
                <p>Fase 1 · Hidratación profunda</p>
            </div>
            <div class="screen-content">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">
                            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                                <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path>
                                <polyline points="13 2 13 9 20 9"></polyline>
                            </svg>
                        </div>
                        <p class="stat-value">7</p>
                        <p class="stat-label">Días seguidos</p>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">
                            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                                <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zm-5-7l-2.54-3.2-3.2 4v5h5.54z"></path>
                            </svg>
                        </div>
                        <p class="stat-value">31</p>
                        <p class="stat-label">Días totales</p>
                    </div>
                </div>

                <div class="calendar-section">
                    <p class="calendar-title">Calendario de constancia</p>
                    <div id="calendar-grid" class="calendar-grid"></div>
                </div>

                <div class="info-box accent">
                    <svg class="icon-small" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"></path>
                    </svg>
                    <div>
                        <strong>¡Vas increíble!</strong> Estás en el 22% de tu proceso. La transformación visible suele iniciar entre el día 14 y 21.
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- Cards Screen Template -->
    <template id="cards-screen">
        <div class="screen cards-screen">
            <div class="status-bar dark"></div>
            <div class="page-header">
                <h1>Tarjetas</h1>
                <p>Tu membresía y recompensas</p>
            </div>
            <div class="screen-content">
                <div class="membership-card primary">
                    <div class="leaf-pattern"></div>
                    <div class="card-body">
                        <div class="card-top">
                            <div class="andora-logo light">
                                <svg viewBox="0 0 32 32" fill="none" aria-hidden="true">
                                    <path d="M16 3C9 8 5 14 5 20a11 11 0 0 0 22 0c0-6-4-12-11-17Z" fill="currentColor" opacity="0.18"/>
                                    <path d="M16 5C10 9.5 7 15 7 20.2A9 9 0 0 0 25 20.2C25 15 22 9.5 16 5Z" stroke="currentColor" stroke-width="1.6" fill="none"/>
                                    <path d="M16 8.5V25M16 14.5l4-2.6M16 18.5l-4-2.6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                                </svg>
                                <span>andora</span>
                            </div>
                            <span class="membership-badge">Glow Member</span>
                        </div>
                        <p class="card-label">Puntos Andora</p>
                        <p class="card-points">380</p>
                        <p class="card-name">Ruby Martínez</p>
                    </div>
                </div>

                <h3 class="section-title">Recompensas</h3>
                <div id="rewards-list" class="rewards-list">
                    <div class="reward-item">
                        <div class="reward-icon">
                            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                            </svg>
                        </div>
                        <div class="reward-content">
                            <p class="reward-title">Envío gratis</p>
                            <p class="reward-sub">Disponible ahora</p>
                        </div>
                        <span class="reward-badge ready">Canjear</span>
                    </div>
                    <div class="reward-item">
                        <div class="reward-icon">
                            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                                <polygon points="12 2 15.09 10.26 24 10.26 17.55 16.61 19.64 24.88 12 19.54 4.36 24.88 6.45 16.61 0 10.26 8.91 10.26 12 2"></polygon>
                            </svg>
                        </div>
                        <div class="reward-content">
                            <p class="reward-title">15% de descuento</p>
                            <p class="reward-sub">Faltan 120 puntos</p>
                        </div>
                        <span class="reward-badge locked">Bloqueado</span>
                    </div>
                    <div class="reward-item">
                        <div class="reward-icon">
                            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4 11h-3v3h-2v-3H8v-2h3V8h2v3h3v2z"></path>
                            </svg>
                        </div>
                        <div class="reward-content">
                            <p class="reward-title">Mascarilla de regalo</p>
                            <p class="reward-sub">Faltan 400 puntos</p>
                        </div>
                        <span class="reward-badge locked">Bloqueado</span>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- Profile Screen Template -->
    <template id="profile-screen">
        <div class="screen profile-screen">
            <div class="status-bar dark"></div>
            <div class="page-header">
                <h1>Perfil</h1>
            </div>
            <div class="screen-content">
                <div class="profile-card">
                    <div class="profile-avatar">R</div>
                    <p class="profile-name">Ruby Martínez</p>
                    <p class="profile-email">ruby@andora.com · Glow Member</p>
                </div>

                <div id="menu-group" class="menu-group">
                    <button type="button" class="menu-item">
                        <div class="menu-icon">
                            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                                <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path>
                                <polyline points="13 2 13 9 20 9"></polyline>
                            </svg>
                        </div>
                        <span class="menu-label">Mi rutina de piel</span>
                        <svg class="menu-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </button>
                    <button type="button" class="menu-item">
                        <div class="menu-icon">
                            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                            </svg>
                        </div>
                        <span class="menu-label">Favoritos</span>
                        <svg class="menu-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </button>
                    <button type="button" class="menu-item">
                        <div class="menu-icon">
                            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                                <circle cx="9" cy="21" r="1"></circle>
                                <circle cx="20" cy="21" r="1"></circle>
                                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                            </svg>
                        </div>
                        <span class="menu-label">Mis pedidos</span>
                        <svg class="menu-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </button>
                </div>

                <div id="menu-group-2" class="menu-group">
                    <button type="button" class="menu-item">
                        <div class="menu-icon">
                            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                                <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                            </svg>
                        </div>
                        <span class="menu-label">Notificaciones</span>
                        <svg class="menu-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </button>
                    <button type="button" class="menu-item">
                        <div class="menu-icon">
                            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                                <circle cx="12" cy="12" r="10"></circle>
                                <path d="M12 6v6m0 4v.01"></path>
                            </svg>
                        </div>
                        <span class="menu-label">Ayuda y soporte</span>
                        <svg class="menu-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </button>
                </div>

                <button type="button" class="btn-logout">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    Cerrar sesión
                </button>
            </div>
        </div>
    </template>

    <!-- Bottom Navigation Template -->
    <template id="bottom-nav">

            <button type="button" class="nav-item" data-screen="home" aria-label="Inicio">

                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">

                    <polyline points="19 12 12 19 5 12"></polyline>
                </svg>
                <span>Progreso</span>

            <button type="button" class="nav-center" data-screen="chat" aria-label="Andora">

                    <path d="M16 8.5V25M16 14.5l4-2.6M16 18.5l-4-2.6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                </svg>
            </button>
            <button type="button" class="nav-item" data-screen="cards" aria-label="Tarjetas">

                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <span>Perfil</span>

        </div>
